services:
  backend:
    build:
      context: ./backend
    container_name: market-intelligence-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: market-intelligence-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend